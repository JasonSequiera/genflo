<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — GenFlo</title>
  <meta name="description" content="Sign in to your GenFlo account and reconnect with your cycle companion Aria." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/api.js"></script>
  <script src="js/toast.js"></script>
</head>
<body>

  <nav id="main-nav" class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo"><span class="logo-mark">⬡</span>GenFlo</a>
      <ul class="nav-links">
        <li><a href="index.html#features">Features</a></li>
        <li><a href="aria.html">Ask Aria</a></li>
      </ul>
      <div class="nav-actions">
        <a href="onboarding.html" class="btn-primary">Begin Journey</a>
      </div>
    </div>
  </nav>

  <section class="page-hero" style="min-height:100vh; display:flex; align-items:center;">
    <div class="container" style="width:100%;">
      <div class="form-card">
        <div style="text-align:center; margin-bottom:24px;">
          <div class="nav-logo" style="justify-content:center; font-size:1.8rem; margin-bottom:8px;">
            <span class="logo-mark">⬡</span>GenFlo
          </div>
        </div>
        <h2>Welcome Back</h2>
        <p class="sub">Sign in to your account to continue your journey</p>

        <div id="login-error" style="display:none;background:rgba(201,124,93,0.1);border:1px solid rgba(201,124,93,0.3);color:var(--terracotta);padding:12px 16px;border-radius:var(--radius-sm);font-size:0.85rem;margin-bottom:16px;"></div>
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="you@email.com" required />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn-primary form-submit" id="login-btn">Sign In →</button>
        </form>

        <div class="form-footer">
          New to GenFlo? <a href="onboarding.html">Begin your journey</a>
        </div>

        <!-- Divider -->
        <div style="display:flex;align-items:center;gap:12px;margin:24px 0;">
          <div style="flex:1;height:1px;background:var(--card-border);"></div>
          <span style="font-size:0.8rem;color:var(--text-muted);">or continue with</span>
          <div style="flex:1;height:1px;background:var(--card-border);"></div>
        </div>

        <div style="display:flex;flex-direction:column;gap:10px;">
          <button class="btn-ghost" style="width:100%;justify-content:center;gap:10px;" onclick="toast.info('Google Sign-in coming soon! 🚀')">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continue with Google
          </button>
          <button class="btn-ghost" style="width:100%;justify-content:center;" onclick="toast.info('Apple Sign-in coming soon! 🍎')">
            🍎 Continue with Apple
          </button>
        </div>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script>
    // Redirect if already logged in
    if (GenFloAPI.isLoggedIn()) window.location.href = 'dashboard.html';

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errorDiv = document.getElementById('login-error');

      btn.textContent = 'Signing in...';
      btn.disabled = true;
      errorDiv.style.display = 'none';

      const result = await GenFloAPI.login(email, password);

      if (result && result.token) {
        window.location.href = 'dashboard.html';
      } else {
        errorDiv.textContent = result?.error || 'Invalid email or password. Please try again.';
        errorDiv.style.display = 'block';
        btn.textContent = 'Sign In →';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
